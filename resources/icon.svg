<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A90D9"/>
      <stop offset="100%" stop-color="#357ABD"/>
    </linearGradient>
  </defs>
  <rect width="128" height="128" rx="20" fill="url(#bg)"/>
  <!-- center node -->
  <rect x="36" y="50" width="56" height="28" rx="14" fill="#fff" opacity="0.95"/>
  <!-- top-right branch line -->
  <line x1="92" y1="57" x2="108" y2="32" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- top-right node -->
  <rect x="96" y="22" width="24" height="16" rx="8" fill="#fff" opacity="0.7"/>
  <!-- bottom-right branch line -->
  <line x1="92" y1="71" x2="108" y2="96" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- bottom-right node -->
  <rect x="96" y="88" width="24" height="16" rx="8" fill="#fff" opacity="0.7"/>
  <!-- mid-right branch line -->
  <line x1="92" y1="64" x2="112" y2="64" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- mid-right node -->
  <rect x="100" y="56" width="20" height="16" rx="8" fill="#fff" opacity="0.7"/>
  <!-- left branch line -->
  <line x1="36" y1="57" x2="20" y2="38" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- left top node -->
  <rect x="8" y="28" width="24" height="16" rx="8" fill="#fff" opacity="0.7"/>
  <!-- left bottom branch line -->
  <line x1="36" y1="71" x2="20" y2="90" stroke="#fff" stroke-width="2.5" stroke-linecap="round" opacity="0.8"/>
  <!-- left bottom node -->
  <rect x="8" y="82" width="24" height="16" rx="8" fill="#fff" opacity="0.7"/>
  <!-- KM text in center -->
  <text x="64" y="70" text-anchor="middle" font-family="Arial,Helvetica,sans-serif" font-weight="bold" font-size="18" fill="#357ABD">KM</text>
</svg>
